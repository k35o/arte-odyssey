packages:
  - packages/*
  - apps/*
  - examples/*

allowBuilds:
  '@tailwindcss/oxide': false
  agent-browser: true
  edgedriver: false
  esbuild: false
  geckodriver: false
  sharp: false

blockExoticSubdeps: true

catalog:
  '@tailwindcss/postcss': 4.3.0
  '@tailwindcss/vite': 4.3.0
  '@types/react': 19.2.15
  '@types/react-dom': 19.2.3
  '@vitejs/plugin-react': 6.0.2
  postcss: 8.5.15
  react: 19.2.6
  react-dom: 19.2.6
  tailwindcss: 4.3.0
  vite: 8.0.14
  vite-plus: 0.1.22
  vitest: 4.1.7

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
  - '@k8o/*'
  - 'tailwind-token-extractor'

verifyDepsBeforeRun: install
