packages:
  - packages/*
  - apps/*
  - examples/*

allowBuilds:
  '@tailwindcss/oxide': false
  agent-browser: true
  edgedriver: false
  esbuild: false
  geckodriver: false
  sharp: false

blockExoticSubdeps: true

catalog:
  '@tailwindcss/postcss': 4.2.4
  '@tailwindcss/vite': 4.2.4
  '@types/react': 19.2.14
  '@types/react-dom': 19.2.3
  '@vitejs/plugin-react': 6.0.1
  postcss: 8.5.14
  react: 19.2.6
  react-dom: 19.2.6
  tailwindcss: 4.2.4
  vite: 8.0.10
  vite-plus: 0.1.20
  vitest: 4.1.5

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
  - '@k8o/*'

verifyDepsBeforeRun: install
